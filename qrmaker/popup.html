<!doctype html>
<html class="no-scrollbar">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible w-80 bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div class="p-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img src="icons/icon32.png" alt="" class="h-5 w-5 shrink-0 self-center" />
          <h1 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">QRmaker</h1>
        </div>
        <button
          id="theme-toggle"
          type="button"
          class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>

      <div class="my-3 border-t border-slate-200 dark:border-slate-700"></div>

      <div id="qrWrap" class="flex justify-center">
        <div class="rounded-xl bg-white p-3 shadow-sm ring-1 ring-slate-200 dark:ring-slate-700">
          <div id="qrMount" class="h-[232px] w-[232px]" aria-label="QR code"></div>
        </div>
      </div>

      <div class="mt-3">
        <textarea
          id="content"
          rows="1"
          placeholder="URL or text to encode"
          aria-label="QR content"
          class="qr-inp resize-none leading-snug"
        ></textarea>
      </div>

      <details id="options" class="group mt-3 rounded-lg border border-slate-300 bg-slate-200 dark:border-slate-700 dark:bg-slate-800">
        <summary class="flex cursor-pointer list-none items-center justify-between px-3 py-2 text-[10px] font-semibold uppercase tracking-wider text-slate-500 [&::-webkit-details-marker]:hidden dark:text-slate-400">
          Options
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="h-3.5 w-3.5 transition-transform group-open:rotate-180">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </summary>
        <div class="space-y-3 px-3 pb-3">
          <div class="grid grid-cols-3 gap-2">
            <label class="block">
              <span class="qr-cap">Dots</span>
              <input id="colorDots" type="color" value="#000000" aria-label="Dots color" class="qr-color" />
            </label>
            <label class="block">
              <span class="qr-cap">Corners</span>
              <input id="colorCorners" type="color" value="#000000" aria-label="Corners color" class="qr-color" />
            </label>
            <label class="block">
              <span class="qr-cap">Background</span>
              <input id="colorBg" type="color" value="#ffffff" aria-label="Background color" class="qr-color" />
            </label>
          </div>

          <button id="reset" type="button" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs font-medium text-slate-600 transition hover:bg-slate-50 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
            Reset to defaults
          </button>
        </div>
      </details>

      <div id="controls" class="mt-3">
        <div class="flex items-stretch gap-2">
          <button
            id="download"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            class="flex flex-1 items-center justify-center gap-1.5 rounded-lg px-3 py-2 text-sm font-semibold shadow-sm transition active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-1
                   bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-400 disabled:opacity-50
                   dark:focus:ring-offset-slate-900"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Download
            <svg id="download-caret" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="h-3.5 w-3.5 transition-transform">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </button>
          <button
            id="copy"
            type="button"
            title="Copy image to clipboard"
            aria-label="Copy image to clipboard"
            class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-600 shadow-sm transition hover:bg-slate-50 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:opacity-50
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
            </svg>
          </button>
          <button
            id="scan"
            type="button"
            title="Scan a QR image"
            aria-label="Scan a QR image"
            class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-600 shadow-sm transition hover:bg-slate-50 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:opacity-50
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4">
              <!-- finder patterns (ring + center) -->
              <path fill-rule="evenodd" clip-rule="evenodd" d="M2 2h7v7H2V2zm1 1v5h5V3H3z" />
              <rect x="4" y="4" width="3" height="3" />
              <path fill-rule="evenodd" clip-rule="evenodd" d="M15 2h7v7h-7V2zm1 1v5h5V3h-5z" />
              <rect x="17" y="4" width="3" height="3" />
              <path fill-rule="evenodd" clip-rule="evenodd" d="M2 15h7v7H2v-7zm1 1v5h5v-5H3z" />
              <rect x="4" y="17" width="3" height="3" />
              <!-- data modules -->
              <rect x="13" y="13" width="2" height="2" />
              <rect x="19" y="13" width="2" height="2" />
              <rect x="22" y="16" width="2" height="2" />
              <rect x="16" y="16" width="2" height="2" />
              <rect x="13" y="19" width="2" height="2" />
              <rect x="19" y="19" width="2" height="2" />
              <rect x="16" y="22" width="2" height="2" />
            </svg>
          </button>
          <button
            id="advanced"
            type="button"
            title="Advanced editor"
            aria-label="Advanced editor"
            class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-600 shadow-sm transition hover:bg-slate-50 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:opacity-50
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
            </svg>
          </button>
        </div>
        <div id="downloadMenu" role="menu" aria-label="Download format" hidden class="mt-2 grid grid-cols-3 gap-2">
          <button role="menuitem" type="button" data-format="png" class="fmt-btn">PNG</button>
          <button role="menuitem" type="button" data-format="svg" class="fmt-btn">SVG</button>
          <button role="menuitem" type="button" data-format="jpeg" class="fmt-btn">JPG</button>
        </div>
      </div>

      <p id="status" class="mt-3 text-center text-xs text-slate-500 empty:hidden dark:text-slate-400"></p>
    </div>
    <script src="vendor/qr-code-styling.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
