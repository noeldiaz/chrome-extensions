<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="titleHistory">QRmaker — History</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible flex min-h-screen flex-col bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <header class="sticky top-0 z-10 border-b border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
      <div class="mx-auto flex max-w-3xl items-center justify-between px-6 py-3">
        <div class="flex items-center gap-2">
          <img src="icons/icon32.png" alt="" class="h-5 w-5 shrink-0 self-center" />
          <h1 data-i18n="h1History" class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">
            QRmaker — History
          </h1>
        </div>
        <button
          id="theme-toggle"
          type="button"
          data-i18n-attr="title:themeToggle,aria-label:themeToggle"
          class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>
    </header>

    <main class="mx-auto w-full max-w-3xl flex-1 px-6 py-8">
      <div class="mb-4 flex items-center justify-between">
        <span id="count" class="text-xs font-medium text-slate-500 dark:text-slate-400"></span>
        <button id="clearAll" type="button" hidden data-i18n="clearAll"
          class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-600 shadow-sm transition hover:border-red-400 hover:bg-red-50 hover:text-red-600 focus:outline-none focus:ring-2 focus:ring-red-300
                 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:border-red-500 dark:hover:bg-red-950 dark:hover:text-red-300">
          Clear all
        </button>
      </div>

      <div id="list" class="space-y-3"></div>

      <p id="empty" data-i18n="emptyHistory" class="mt-16 text-center text-sm text-slate-400 dark:text-slate-500" hidden>
        No codes yet. Codes you download or copy show up here.
      </p>
    </main>

    <footer class="sticky bottom-0 z-10 border-t border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
      <div class="mx-auto flex max-w-3xl justify-end px-6 py-3">
        <button id="winClose" type="button"
          class="inline-flex items-center gap-1.5 rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-3.5 w-3.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
          <span data-i18n="close">Close</span>
        </button>
      </div>
    </footer>

    <script src="vendor/qr-code-styling.js"></script>
    <script type="module" src="history.js"></script>
  </body>
</html>
