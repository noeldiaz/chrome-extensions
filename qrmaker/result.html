<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="titleScan">QRmaker — Scan</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible w-full bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div class="p-5">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img src="icons/icon32.png" alt="" class="h-5 w-5 shrink-0 self-center" />
          <h1 data-i18n="titleScan" class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">QRmaker — Scan</h1>
        </div>
        <button
          id="theme-toggle"
          type="button"
          data-i18n-attr="title:themeToggle,aria-label:themeToggle"
          class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>

      <div class="my-4 border-t border-slate-200 dark:border-slate-700"></div>

      <!-- source thumbnail -->
      <div id="thumbWrap" class="mb-4 flex justify-center" hidden>
        <img id="thumb" alt="" class="max-h-40 rounded-lg border border-slate-200 object-contain dark:border-slate-700" />
      </div>

      <!-- grant access (cross-origin images) -->
      <button id="grant" type="button" hidden data-i18n="grant"
        class="mb-3 w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
        Allow access &amp; scan this image
      </button>

      <!-- pick an image to scan -->
      <button id="pick" type="button"
        class="mb-3 flex w-full items-center justify-center gap-1.5 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
               dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor" class="h-4 w-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
        <span data-i18n="pick">Scan an image file</span>
      </button>
      <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/bmp" hidden />

      <!-- scan with the camera -->
      <button id="camera" type="button"
        class="mb-3 flex w-full items-center justify-center gap-1.5 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
               dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor" class="h-4 w-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
        </svg>
        <span data-i18n="camera">Scan with camera</span>
      </button>

      <p id="dropHint" data-i18n="dropHint" class="mb-3 text-center text-[10px] text-slate-400 dark:text-slate-500">
        …or drag &amp; drop or paste an image
      </p>

      <!-- live camera view -->
      <div id="cameraView" class="mb-3" hidden>
        <div class="overflow-hidden rounded-lg border border-slate-200 bg-black dark:border-slate-700">
          <video id="video" autoplay playsinline muted class="block max-h-72 w-full object-contain"></video>
        </div>
        <button id="cameraStop" type="button" data-i18n="cameraStop"
          class="mt-2 w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
          Stop camera
        </button>
      </div>

      <!-- decoded content -->
      <div id="result" hidden>
        <div class="mb-1 flex items-center gap-2">
          <span data-i18n="contentLabel" class="text-[10px] font-medium text-slate-500 dark:text-slate-400">Content</span>
          <span id="typeBadge" hidden
            class="rounded bg-blue-100 px-1.5 py-0.5 text-[10px] font-semibold text-blue-700 dark:bg-blue-900 dark:text-blue-300"></span>
        </div>
        <textarea id="content" rows="3" readonly
          class="w-full resize-y rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100"></textarea>
        <div class="mt-3 flex gap-2">
          <button id="goto" type="button" hidden data-i18n="goTo"
            class="flex-1 rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
            Go to
          </button>
          <button id="copy" type="button" data-i18n="copy"
            class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
            Copy
          </button>
          <button id="edit" type="button" data-i18n="edit"
            class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
            Edit
          </button>
        </div>
      </div>

      <!-- page scan: list of codes found on the page -->
      <div id="pageList" class="space-y-3" hidden></div>

      <p id="status" class="mt-3 text-center text-xs text-slate-500 empty:hidden dark:text-slate-400"></p>
    </div>
    <footer class="border-t border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
      <div class="flex justify-end px-5 py-3">
        <button id="winClose" type="button" data-i18n="close"
          class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
          Close
        </button>
      </div>
    </footer>
    <!-- drag-over feedback -->
    <div id="dropOverlay" hidden class="pointer-events-none fixed inset-0 z-20 flex items-center justify-center bg-blue-500/10 p-6 backdrop-blur-[1px]">
      <div data-i18n="dropOverlay" class="rounded-xl border-2 border-dashed border-blue-400 bg-white/90 px-6 py-4 text-sm font-semibold text-blue-700 shadow-lg dark:bg-slate-800/90 dark:text-blue-300">
        Drop an image to scan
      </div>
    </div>

    <script src="vendor/jsqr.js"></script>
    <script src="vendor/qr-code-styling.js"></script>
    <script type="module" src="result.js"></script>
  </body>
</html>
