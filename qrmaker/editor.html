<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>QRmaker — Advanced editor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible min-h-screen bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <header class="border-b border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
      <div class="mx-auto flex max-w-3xl items-center justify-between px-6 py-3">
        <h1 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">
          QRmaker — Advanced editor
        </h1>
        <button
          id="theme-toggle"
          type="button"
          class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>
    </header>

    <main class="mx-auto max-w-3xl px-6 py-10">
      <div class="rounded-xl border border-slate-200 bg-white p-8 text-center shadow-sm dark:border-slate-700 dark:bg-slate-800">
        <h2 class="text-lg font-semibold text-slate-800 dark:text-slate-100">Under construction</h2>
        <p class="mx-auto mt-2 max-w-md text-sm text-slate-500 dark:text-slate-400">
          The advanced editor is coming next. It will let you customize colors, dot
          and corner styles, background gradients, a center logo, frame text, and
          save your favorite designs as defaults.
        </p>
      </div>
    </main>
    <script type="module" src="editor.js"></script>
  </body>
</html>
