<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>QRmaker — Advanced editor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible min-h-screen bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <header class="border-b border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-3">
        <h1 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">
          QRmaker — Advanced editor
        </h1>
        <button
          id="theme-toggle"
          type="button"
          class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>
    </header>

    <main class="mx-auto grid max-w-5xl gap-8 px-6 py-8 lg:grid-cols-[1fr_320px]">
      <!-- controls -->
      <section class="space-y-6">
        <div class="qr-card">
          <h2 class="qr-section-title">Content</h2>
          <textarea id="content" rows="3" placeholder="URL or text to encode"
            class="w-full resize-y rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-blue-400 dark:focus:ring-blue-400"></textarea>
        </div>

        <div class="qr-card">
          <h2 class="qr-section-title">Style</h2>
          <span class="qr-cap">Dot style</span>
          <div id="dotStyle" class="mb-3 flex flex-wrap gap-2">
            <button type="button" class="chip is-active" data-value="square">Square</button>
            <button type="button" class="chip" data-value="rounded">Rounded</button>
            <button type="button" class="chip" data-value="dots">Dots</button>
            <button type="button" class="chip" data-value="classy-rounded">Classy</button>
          </div>
          <span class="qr-cap">Corner style</span>
          <div id="cornerStyle" class="flex flex-wrap gap-2">
            <button type="button" class="chip is-active" data-value="square">Square</button>
            <button type="button" class="chip" data-value="extra-rounded">Rounded</button>
            <button type="button" class="chip" data-value="dot">Dots</button>
          </div>
        </div>

        <div class="qr-card">
          <h2 class="qr-section-title">Colors</h2>
          <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
            <label class="block">
              <span class="qr-cap">Dots</span>
              <input id="colorDots" type="color" value="#000000" aria-label="Dots color" class="qr-color" />
            </label>
            <label class="block">
              <span class="qr-cap">Corners</span>
              <input id="colorCorners" type="color" value="#000000" aria-label="Corners color" class="qr-color" />
            </label>
            <label id="bgColorWrap" class="block">
              <span class="qr-cap">Background</span>
              <input id="colorBg" type="color" value="#ffffff" aria-label="Background color" class="qr-color" />
            </label>
          </div>

          <label class="mt-4 flex cursor-pointer items-center gap-2 text-xs text-slate-600 dark:text-slate-400">
            <input id="gradientOn" type="checkbox" class="h-3.5 w-3.5 accent-blue-600" />
            Background gradient
          </label>
          <div id="gradientFields" class="mt-3 grid grid-cols-2 gap-3 sm:grid-cols-4" hidden>
            <label class="block">
              <span class="qr-cap">Stop 1</span>
              <input id="gradColor1" type="color" value="#1e88e5" aria-label="Gradient color 1" class="qr-color" />
            </label>
            <label class="block">
              <span class="qr-cap">Stop 2</span>
              <input id="gradColor2" type="color" value="#ffffff" aria-label="Gradient color 2" class="qr-color" />
            </label>
            <label class="block">
              <span class="qr-cap">Type</span>
              <select id="gradType" class="qr-sel">
                <option value="linear">Linear</option>
                <option value="radial">Radial</option>
              </select>
            </label>
            <label class="block">
              <span class="qr-cap">Angle <span id="gradRotationLabel">0°</span></span>
              <input id="gradRotation" type="range" min="0" max="360" step="5" value="0" class="w-full accent-blue-600" />
            </label>
          </div>
        </div>

        <div class="qr-card">
          <h2 class="qr-section-title">Layout</h2>
          <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
            <label class="block">
              <span class="qr-cap">Margin <span id="marginLabel">10px</span></span>
              <input id="margin" type="range" min="0" max="40" step="1" value="10" class="w-full accent-blue-600" />
            </label>
            <label class="block">
              <span class="qr-cap">Error correction</span>
              <select id="ecLevel" class="qr-sel">
                <option value="L">Low</option>
                <option value="M" selected>Medium</option>
                <option value="Q">Quartile</option>
                <option value="H">High</option>
              </select>
            </label>
            <label class="block">
              <span class="qr-cap">Export size <span id="sizeLabel">512px</span></span>
              <input id="size" type="range" min="100" max="1000" step="10" value="512" class="w-full accent-blue-600" />
            </label>
          </div>
        </div>
      </section>

      <!-- preview -->
      <aside class="h-fit lg:sticky lg:top-8">
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
          <div id="qrMount" class="mx-auto flex h-64 w-64 items-center justify-center"></div>
        </div>
        <p id="empty" class="mt-3 text-center text-xs text-slate-400 dark:text-slate-500" hidden>
          Enter content to generate a code.
        </p>

        <div class="mt-4 grid grid-cols-3 gap-2">
          <button id="dlPng" type="button" data-format="png" class="fmt-btn inline-flex items-center justify-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            PNG
          </button>
          <button id="dlSvg" type="button" data-format="svg" class="fmt-btn inline-flex items-center justify-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            SVG
          </button>
          <button id="dlJpg" type="button" data-format="jpeg" class="fmt-btn inline-flex items-center justify-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            JPG
          </button>
        </div>
        <div class="mt-2 grid grid-cols-2 gap-2">
          <button id="copy" type="button"
            class="inline-flex items-center justify-center gap-1.5 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-300
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
            </svg>
            Copy
          </button>
          <button id="reset" type="button"
            class="inline-flex items-center justify-center gap-1.5 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-300
                   dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="h-4 w-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            Reset
          </button>
        </div>
        <p id="status" class="mt-3 text-center text-xs text-slate-500 empty:hidden dark:text-slate-400"></p>
      </aside>
    </main>
    <script src="vendor/qr-code-styling.js"></script>
    <script type="module" src="editor.js"></script>
  </body>
</html>
