<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body class="invisible w-72 bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div class="p-4">
      <div class="flex items-center justify-between">
        <h1 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">Screener</h1>
        <button
          id="theme-toggle"
          type="button"
          class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          <svg data-theme-moon xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg data-theme-sun xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>

      <div class="my-3 border-t border-slate-200 dark:border-slate-700"></div>

      <div id="captures" class="space-y-2">
        <button type="button" class="cap-btn" data-mode="visible">
          <span class="cap-btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8.25V18a2.25 2.25 0 002.25 2.25h13.5A2.25 2.25 0 0021 18V8.25m-18 0V6a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 6v2.25m-18 0h18" />
            </svg>
          </span>
          <span>
            <span class="block text-sm font-medium text-slate-900 dark:text-slate-100">Visible area</span>
            <span class="block text-xs text-slate-500 dark:text-slate-400">What you see right now</span>
          </span>
        </button>

        <button type="button" class="cap-btn" data-mode="selection">
          <span class="cap-btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3" d="M4.5 6.75A2.25 2.25 0 016.75 4.5h10.5a2.25 2.25 0 012.25 2.25v10.5a2.25 2.25 0 01-2.25 2.25H6.75a2.25 2.25 0 01-2.25-2.25V6.75z" />
            </svg>
          </span>
          <span>
            <span class="block text-sm font-medium text-slate-900 dark:text-slate-100">Selected area</span>
            <span class="block text-xs text-slate-500 dark:text-slate-400">Drag to pick a region</span>
          </span>
          <span class="soon-tag">Soon</span>
        </button>

        <button type="button" class="cap-btn" data-mode="fullpage">
          <span class="cap-btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3.75v12m0 0l-3.75-3.75M12 15.75l3.75-3.75M4.5 20.25h15" />
            </svg>
          </span>
          <span>
            <span class="block text-sm font-medium text-slate-900 dark:text-slate-100">Full page</span>
            <span class="block text-xs text-slate-500 dark:text-slate-400">Top to bottom, scrolled</span>
          </span>
          <span class="soon-tag">Soon</span>
        </button>

        <button type="button" class="cap-btn" data-mode="fullscreen">
          <span class="cap-btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25" />
            </svg>
          </span>
          <span>
            <span class="block text-sm font-medium text-slate-900 dark:text-slate-100">Full screen</span>
            <span class="block text-xs text-slate-500 dark:text-slate-400">Whole monitor or a window</span>
          </span>
          <span class="soon-tag">Soon</span>
        </button>
      </div>

      <p id="status" class="mt-3 text-center text-xs text-red-500 empty:hidden dark:text-red-400"></p>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
