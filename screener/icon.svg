<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 4 120 120">
  <!-- blue camera, transparent background; artwork spans 4..124 so the cropped viewBox fills edge-to-edge -->
  <!-- viewfinder hump on top -->
  <rect x="42" y="4" width="44" height="26" rx="7" fill="#1e88e5"/>
  <!-- camera body -->
  <rect x="4" y="26" width="120" height="98" rx="20" fill="#1e88e5"/>
  <!-- white lens ring -->
  <circle cx="64" cy="80" r="40" fill="#ffffff"/>
  <circle cx="64" cy="80" r="20" fill="#1e88e5"/>
  <!-- lens highlight -->
  <circle cx="49" cy="65" r="8" fill="#ffffff"/>
  <!-- flash / indicator dot -->
  <circle cx="110" cy="44" r="7" fill="#ffffff"/>
</svg>
