<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54646f"/>
      <stop offset="0.5" stop-color="#37474f"/>
      <stop offset="1" stop-color="#202a31"/>
    </linearGradient>
    <linearGradient id="hump" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d6e79"/>
      <stop offset="1" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f6f7"/>
      <stop offset="0.4" stop-color="#cfd8dc"/>
      <stop offset="0.6" stop-color="#90a4ae"/>
      <stop offset="1" stop-color="#607d8b"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#90caf9"/>
      <stop offset="0.45" stop-color="#1e88e5"/>
      <stop offset="1" stop-color="#0d47a1"/>
    </radialGradient>
  </defs>

  <!-- cam1 artwork (rectangular body) scaled to fill width, centered vertically -->
  <g transform="translate(0,8) scale(1.142857) translate(-8,-20)">
    <rect x="44" y="20" width="40" height="20" rx="6" fill="url(#hump)"/>
    <rect x="8" y="34" width="112" height="84" rx="18" fill="url(#body)"/>
    <rect x="14" y="38" width="100" height="6" rx="3" fill="#ffffff" opacity="0.12"/>
    <rect x="98" y="26" width="16" height="9" rx="4" fill="url(#ring)" stroke="#607d8b" stroke-width="0.75"/>
    <rect x="18" y="42" width="14" height="9" rx="2.5" fill="#cfd8dc" opacity="0.85"/>

    <circle cx="64" cy="80" r="35" fill="url(#ring)"/>
    <circle cx="64" cy="80" r="30" fill="#263238"/>
    <circle cx="64" cy="80" r="26" fill="url(#glass)"/>
    <circle cx="64" cy="80" r="14" fill="#0d2a52"/>
    <circle cx="64" cy="80" r="7" fill="#1e88e5"/>
    <ellipse cx="52" cy="68" rx="9" ry="6" fill="#ffffff" opacity="0.4" transform="rotate(-35 52 68)"/>
    <circle cx="76" cy="94" r="3.5" fill="#ffffff" opacity="0.25"/>
  </g>
</svg>
