<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Screener — Editor</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body class="invisible flex h-screen flex-col overflow-hidden bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <!-- Top bar -->
    <header class="flex items-center justify-between border-b border-slate-200 bg-white px-4 py-2.5 dark:border-slate-700 dark:bg-slate-800">
      <div class="flex items-baseline gap-3">
        <h1 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">Screener</h1>
        <span id="meta" class="max-w-md truncate text-xs text-slate-500 dark:text-slate-400"></span>
      </div>
      <button
        id="theme-toggle"
        type="button"
        class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
        title="Toggle dark mode"
        aria-label="Toggle dark mode"
      >
        <svg data-theme-moon xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
        </svg>
        <svg data-theme-sun xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
        </svg>
      </button>
    </header>

    <!-- Toolbar -->
    <div id="toolbar" class="flex flex-wrap items-center gap-1 border-b border-slate-200 bg-white px-3 py-1.5 dark:border-slate-700 dark:bg-slate-800">
      <div class="flex items-center gap-0.5" data-tools>
        <button class="tool-btn is-active" data-tool="select" title="Select / move (V)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4"><path d="M5.5 3.2l13 7.1-5.7 1.3-1.3 5.7-6-14.1z"/></svg>
        </button>
        <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4"><rect x="3.5" y="5.5" width="17" height="13" rx="1.5"/></svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="Arrow (A)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M5 19L19 5M9 5h10v10"/></svg>
        </button>
        <button class="tool-btn" data-tool="pen" title="Pen (P)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M16.5 3.5l4 4L7 21l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" title="Text (T)">
          <span class="text-sm font-bold leading-none">T</span>
        </button>
        <button class="tool-btn" data-tool="redact" title="Redact (block out)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4"><rect x="3.5" y="6.5" width="17" height="11" rx="1.5"/></svg>
        </button>
      </div>

      <span class="mx-1.5 h-5 w-px bg-slate-200 dark:bg-slate-600"></span>

      <div class="flex items-center gap-1" data-colors>
        <button class="swatch is-active" data-color="#ef4444" style="background:#ef4444" title="Red"></button>
        <button class="swatch" data-color="#f59e0b" style="background:#f59e0b" title="Amber"></button>
        <button class="swatch" data-color="#22c55e" style="background:#22c55e" title="Green"></button>
        <button class="swatch" data-color="#3b82f6" style="background:#3b82f6" title="Blue"></button>
        <button class="swatch" data-color="#0f172a" style="background:#0f172a" title="Black"></button>
        <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
      </div>

      <span class="mx-1.5 h-5 w-px bg-slate-200 dark:bg-slate-600"></span>

      <div class="flex items-center gap-0.5" data-widths>
        <button class="tool-btn" data-width="2" title="Thin"><span class="block h-0.5 w-4 rounded bg-current"></span></button>
        <button class="tool-btn is-active" data-width="4" title="Medium"><span class="block h-1 w-4 rounded bg-current"></span></button>
        <button class="tool-btn" data-width="8" title="Thick"><span class="block h-1.5 w-4 rounded bg-current"></span></button>
      </div>

      <span class="mx-1.5 h-5 w-px bg-slate-200 dark:bg-slate-600"></span>

      <button id="undo" class="tool-btn" title="Undo (Ctrl/Cmd+Z)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 010 10h-1"/></svg>
      </button>
      <button id="redo" class="tool-btn" title="Redo (Ctrl/Cmd+Shift+Z)" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 000 10h1"/></svg>
      </button>
      <button id="delete" class="tool-btn" title="Delete selected (Del)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>
      </button>
    </div>

    <!-- Canvas area -->
    <main id="stageWrap" class="relative flex flex-1 items-center justify-center overflow-auto p-6">
      <div id="stage"></div>
      <p id="empty" hidden class="text-sm text-slate-400 dark:text-slate-500">
        No capture to show. Take a new screenshot from the Screener popup.
      </p>
    </main>

    <!-- Action bar -->
    <footer class="flex items-center justify-end gap-2 border-t border-slate-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-800">
      <p id="status" class="mr-auto text-xs text-slate-500 empty:hidden dark:text-slate-400"></p>

      <button id="copy" type="button" disabled
        class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-300 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-700">
        Copy
      </button>
      <button id="submit" type="button" disabled
        class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-300 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-700">
        Submit ticket
      </button>
      <button id="download" type="button" disabled
        class="rounded-lg bg-blue-600 px-4 py-1.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-1 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50 dark:focus:ring-offset-slate-800">
        Download
      </button>
    </footer>

    <script src="vendor/konva.min.js"></script>
    <script type="module" src="editor.js"></script>
  </body>
</html>
