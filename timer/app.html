<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title data-i18n="appName">Timer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible flex min-h-screen flex-col bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div id="flash"></div>
    <!-- discrete screen-reader announcements (countdown end, laps) -->
    <div id="sr-status" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <!-- header: brand + tool switcher + window controls -->
    <header class="fs-hide flex items-center justify-between gap-4 border-b border-slate-200 bg-white px-6 py-3 dark:border-slate-700 dark:bg-slate-800">
      <div class="flex items-center gap-2">
        <img src="icons/icon32.png" alt="" class="h-6 w-6 shrink-0" />
        <h1 data-i18n="appName" class="text-base font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">Timer</h1>
      </div>

      <div class="flex flex-1 items-center justify-center gap-2">
        <nav class="flex gap-1 rounded-lg bg-slate-200 p-1 dark:border dark:border-slate-700 dark:bg-slate-900">
        <button type="button" class="seg" data-tool="clock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 7v5l3 2" /></svg>
          <span data-i18n="toolClock">Clock</span>
        </button>
        <button type="button" class="seg" data-tool="stopwatch">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 2.75h6M12 2.75v2M18.5 7l1.5-1.5" /><circle cx="12" cy="13" r="7.5" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 13l3-3" /></svg>
          <span data-i18n="toolStopwatch">Stopwatch</span>
        </button>
        <button type="button" class="seg" data-tool="timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 3h12M6 21h12M8 3c0 3.5 8 4.5 8 9s-8 5.5-8 9M16 3c0 3.5-8 4.5-8 9s8 5.5 8 9" /></svg>
          <span data-i18n="toolTimer">Timer</span>
        </button>
        <button type="button" class="seg" data-tool="timers">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
            <circle cx="10" cy="12" r="7" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 8v4l3 1" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 8v6M16 11h6" />
          </svg>
          <span data-i18n="toolMultiTimers">Timers</span>
        </button>
        </nav>
        <!-- alert toggles beside the tabs: alarm mute + screen flash -->
        <div class="flex gap-1 rounded-lg bg-slate-200 p-1 dark:border dark:border-slate-700 dark:bg-slate-900">
          <button id="alarm-toggle" type="button" class="seg-icon" title="Mute alarm sound" aria-label="Mute alarm sound">
            <svg id="bell-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.454 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.969 8.969 0 0 1 5.292 3m13.416 0a8.969 8.969 0 0 1 2.168 4.5" />
            </svg>
            <svg id="bell-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="hidden" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.143 17.082a24.248 24.248 0 0 0 3.844.148m-3.844-.148a23.856 23.856 0 0 1-5.455-1.31 8.964 8.964 0 0 0 2.3-5.542m3.155 6.852a3 3 0 0 0 5.667 1.97m1.965-2.277L21 21m-4.225-4.225a23.81 23.81 0 0 0 3.536-1.003A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6.53 6.53m10.245 10.245L6.53 6.53M3 3l3.53 3.53" />
            </svg>
          </button>
          <button id="flash-toggle" type="button" class="seg-icon" title="Disable screen flash" aria-label="Disable screen flash">
            <svg id="flash-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
            </svg>
            <svg id="flash-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="hidden" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11.412 15.655 9.75 21.75l3.745-4.012M9.257 13.5H3.75l2.659-2.849m2.048-2.194L14.25 2.25 12 10.5h8.25l-4.707 5.043M8.457 8.457 3 3m5.457 5.457 7.086 7.086m0 0L21 21" />
            </svg>
          </button>
        </div>
        <!-- fullscreen on its own, to the right -->
        <div class="flex gap-1 rounded-lg bg-slate-200 p-1 dark:border dark:border-slate-700 dark:bg-slate-900">
          <button id="fullscreen" type="button" class="seg-icon" data-i18n-attr="title:fullscreen,aria-label:fullscreen" title="Fullscreen" aria-label="Fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9V3.75H9M15 3.75h5.25V9M20.25 15v5.25H15M9 20.25H3.75V15" />
            </svg>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-1.5">
        <button id="theme-toggle" type="button" class="icon-btn" data-i18n-attr="title:themeToggle,aria-label:themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-5 w-5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="hidden h-5 w-5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
        <button id="settings" type="button" class="icon-btn" data-i18n-attr="title:settings,aria-label:settings" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-5 w-5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
        <button id="winClose" type="button" class="inline-flex items-center gap-1.5 rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
          <span data-i18n="close">Close</span>
        </button>
      </div>
    </header>

    <!-- centered stage -->
    <main id="stage" class="grid flex-1 place-items-center px-6 pb-10">
      <div class="w-full max-w-2xl">
        <!-- clock -->
        <section id="panel-clock" class="hidden text-center">
          <div id="clock-time" class="display text-8xl font-bold text-slate-900 dark:text-slate-50">00:00:00</div>
          <svg id="clock-analog" class="mx-auto hidden h-72 w-72" role="img" aria-label="Clock"></svg>
          <div id="clock-date" class="mt-4 text-lg text-slate-500 dark:text-slate-400"></div>
          <!-- on-page clock settings (hidden in fullscreen) -->
          <div class="fs-hide mt-8 flex flex-col items-center gap-3">
            <!-- face + time-format switches -->
            <div class="flex flex-wrap items-center justify-center gap-2">
              <div class="seg-group">
                <button id="clk-digital" type="button" class="miniseg" data-style="digital" data-i18n-attr="title:lblDigital,aria-label:lblDigital" title="Digital" aria-label="Digital">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4" aria-hidden="true"><rect x="6.25" y="7" width="11.5" height="10" rx="2.5" /><path stroke-linecap="round" stroke-linejoin="round" d="M9.5 7V4h5v3M9.5 17v3h5v-3" /><path stroke-linecap="round" d="M12 11.2v.01M12 12.9v.01" /></svg>
                </button>
                <button id="clk-analog" type="button" class="miniseg" data-style="analog" data-i18n-attr="title:lblAnalog,aria-label:lblAnalog" title="Analog" aria-label="Analog">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 7v5l3 2" /></svg>
                </button>
              </div>
              <div id="clk-format" class="seg-group">
                <button id="clk-24" type="button" class="miniseg" data-fmt="24" data-i18n="lblHour24">24h</button>
                <button id="clk-12" type="button" class="miniseg" data-fmt="12" data-i18n="lblHour12">12h</button>
              </div>
            </div>
            <!-- toggles -->
            <div class="flex flex-wrap items-center justify-center gap-2">
              <button id="clk-seconds" type="button" class="pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l2.5 1.5" /></svg>
                <span data-i18n="lblSeconds">Seconds</span>
              </button>
              <button id="clk-numbers" type="button" class="pill hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="9" /><text x="12" y="12.5" text-anchor="middle" dominant-baseline="central" font-size="8" font-weight="700" fill="currentColor" stroke="none">12</text></svg>
                <span data-i18n="lblNumbers">Numbers</span>
              </button>
              <button id="clk-date" type="button" class="pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15" rx="2" /><path stroke-linecap="round" stroke-linejoin="round" d="M3.5 9.5h17M8 3.5v3M16 3.5v3" /></svg>
                <span data-i18n="lblDate">Date</span>
              </button>
            </div>
          </div>
        </section>

        <!-- stopwatch -->
        <section id="panel-stopwatch" class="hidden text-center">
          <div id="sw-time" role="timer" class="display text-8xl font-bold text-slate-900 dark:text-slate-50">00:00:00.00</div>
          <div id="sw-laps-wrap" class="fs-hide mx-auto mt-8 hidden max-w-xl">
            <div class="flex items-center justify-between gap-3 px-1 pb-1 text-sm font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">
              <span data-i18n="lapCol" class="w-12">Lap</span>
              <span data-i18n="splitCol" class="flex-1 text-center">Split</span>
              <span data-i18n="totalCol" class="flex-1 text-right">Total</span>
            </div>
            <ol id="sw-laps" class="max-h-56 overflow-y-auto"></ol>
          </div>
          <div class="fs-hide mt-10 flex items-center justify-center gap-3">
            <button id="sw-second" type="button" class="btn btn-soft">
              <svg data-ic="lap" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18M3 4h13l-2 4 2 4H3" /></svg>
              <svg data-ic="reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12a7.5 7.5 0 1 1 2.2 5.3M4.5 12V7.5M4.5 12H9" /></svg>
              <span id="sw-second-label" data-i18n="reset">Reset</span>
            </button>
            <button id="sw-start" type="button" class="btn btn-primary">
              <svg data-ic="play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 4l14 8-14 8V4z" /></svg>
              <svg data-ic="stop" class="hidden" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
              <span id="sw-start-label" data-i18n="start">Start</span>
            </button>
          </div>
          <div class="fs-hide mt-8 flex flex-wrap items-center justify-center gap-2">
            <button id="sw-trim" type="button" class="pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="7" /><line stroke-linecap="round" x1="6" y1="18" x2="18" y2="6" /></svg>
              <span data-i18n="lblTrim">Hide zeros</span>
            </button>
          </div>
        </section>

        <!-- timer -->
        <section id="panel-timer" class="hidden text-center">
          <div id="tm-setup">
            <div class="mx-auto flex max-w-lg items-end justify-center gap-2">
              <label class="flex-1">
                <input id="tm-h" type="number" min="0" max="99" inputmode="numeric" placeholder="00" class="timefield !text-4xl !py-4" aria-label="Hours" />
                <span data-i18n="hours" class="mt-2 block text-center text-xs font-semibold uppercase tracking-wider text-slate-400">Hours</span>
              </label>
              <span class="pb-9 text-4xl font-bold text-slate-300 dark:text-slate-600">:</span>
              <label class="flex-1">
                <input id="tm-m" type="number" min="0" max="59" inputmode="numeric" placeholder="00" class="timefield !text-4xl !py-4" aria-label="Minutes" />
                <span data-i18n="minutes" class="mt-2 block text-center text-xs font-semibold uppercase tracking-wider text-slate-400">Minutes</span>
              </label>
              <span class="pb-9 text-4xl font-bold text-slate-300 dark:text-slate-600">:</span>
              <label class="flex-1">
                <input id="tm-s" type="number" min="0" max="59" inputmode="numeric" placeholder="00" class="timefield !text-4xl !py-4" aria-label="Seconds" />
                <span data-i18n="seconds" class="mt-2 block text-center text-xs font-semibold uppercase tracking-wider text-slate-400">Seconds</span>
              </label>
            </div>
            <!-- chips built from state.timerPresets at render time (controllers.js) -->
            <div id="tm-presets" class="mx-auto mt-6 flex max-w-lg flex-wrap justify-center gap-2"></div>
          </div>
          <div id="tm-display" class="hidden">
            <div id="tm-time" role="timer" class="display text-8xl font-bold text-slate-900 dark:text-slate-50">00:00:00</div>
            <svg id="tm-dial" class="mx-auto hidden h-72 w-72" role="img" aria-label="Timer"></svg>
          </div>
          <div class="fs-hide mt-10 flex items-center justify-center gap-3">
            <button id="tm-reset" type="button" class="btn btn-soft">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12a7.5 7.5 0 1 1 2.2 5.3M4.5 12V7.5M4.5 12H9" /></svg>
              <span data-i18n="reset">Reset</span>
            </button>
            <button id="tm-start" type="button" class="btn btn-primary">
              <svg data-ic="play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 4l14 8-14 8V4z" /></svg>
              <svg data-ic="pause" class="hidden" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 5h3v14H7zM14 5h3v14h-3z" /></svg>
              <svg data-ic="restart" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12a7.5 7.5 0 1 1 2.2 5.3M4.5 12V7.5M4.5 12H9" /></svg>
              <span id="tm-start-label" data-i18n="start">Start</span>
            </button>
          </div>
          <!-- digital / visual-timer switch + numbers toggle -->
          <div class="fs-hide mt-8 flex flex-wrap items-center justify-center gap-2">
            <div class="seg-group">
              <button id="tm-digital" type="button" class="miniseg" data-tmstyle="digital" data-i18n-attr="title:lblDigital,aria-label:lblDigital" title="Digital" aria-label="Digital">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4" aria-hidden="true"><rect x="6.25" y="7" width="11.5" height="10" rx="2.5" /><path stroke-linecap="round" stroke-linejoin="round" d="M9.5 7V4h5v3M9.5 17v3h5v-3" /><path stroke-linecap="round" d="M12 11.2v.01M12 12.9v.01" /></svg>
              </button>
              <button id="tm-analog" type="button" class="miniseg" data-tmstyle="analog" data-i18n-attr="title:lblAnalog,aria-label:lblAnalog" title="Analog" aria-label="Analog">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M12 12V3a9 9 0 0 1 6.364 2.636z" fill="currentColor" stroke="none" /></svg>
              </button>
            </div>
            <button id="tm-numbers" type="button" class="pill hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="9" /><text x="12" y="12.5" text-anchor="middle" dominant-baseline="central" font-size="8" font-weight="700" fill="currentColor" stroke="none">12</text></svg>
              <span data-i18n="lblNumbers">Numbers</span>
            </button>
            <button id="tm-trim" type="button" class="pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="7" /><line stroke-linecap="round" x1="6" y1="18" x2="18" y2="6" /></svg>
              <span data-i18n="lblTrim">Hide zeros</span>
            </button>
          </div>
        </section>

        <!-- multiple concurrent timers (full page only) — the wrapper above
             is top-aligned via the :has() rule in styles.css when this panel is active -->
        <section id="panel-timers" class="hidden">
          <!-- setup card: duration + label + Add (Add aligns with the input row via an invisible caption spacer) -->
          <div class="fs-hide rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700 dark:bg-slate-800">
          <div class="flex items-end gap-2">
            <label class="w-24 shrink-0">
              <input id="mt-h" type="number" min="0" max="99" inputmode="numeric" placeholder="00" class="timefield !h-14 !py-0 !text-2xl" aria-label="Hours" />
              <span data-i18n="hours" class="mt-1 block text-center text-[10px] font-semibold uppercase tracking-wider text-slate-400">Hours</span>
            </label>
            <span class="pb-7 text-2xl font-bold text-slate-300 dark:text-slate-600">:</span>
            <label class="w-24 shrink-0">
              <input id="mt-m" type="number" min="0" max="59" inputmode="numeric" placeholder="00" class="timefield !h-14 !py-0 !text-2xl" aria-label="Minutes" />
              <span data-i18n="minutes" class="mt-1 block text-center text-[10px] font-semibold uppercase tracking-wider text-slate-400">Minutes</span>
            </label>
            <span class="pb-7 text-2xl font-bold text-slate-300 dark:text-slate-600">:</span>
            <label class="w-24 shrink-0">
              <input id="mt-s" type="number" min="0" max="59" inputmode="numeric" placeholder="00" class="timefield !h-14 !py-0 !text-2xl" aria-label="Seconds" />
              <span data-i18n="seconds" class="mt-1 block text-center text-[10px] font-semibold uppercase tracking-wider text-slate-400">Seconds</span>
            </label>
            <label class="min-w-0 flex-1">
              <input id="mt-label" type="text" maxlength="60" placeholder="(optional)" data-i18n-attr="placeholder:multiLabelPlaceholder" class="timefield !h-14 !py-0 !px-3 !text-left !text-base" aria-label="Label" />
              <span data-i18n="multiLabel" class="mt-1 block text-center text-[10px] font-semibold uppercase tracking-wider text-slate-400">Label</span>
            </label>
            <div class="flex shrink-0 flex-col">
              <button id="mt-add" type="button" class="btn btn-primary !h-14 !py-0">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14" />
                </svg>
                <span data-i18n="multiAdd">Add</span>
              </button>
              <span aria-hidden="true" class="invisible mt-1 block text-[10px] font-semibold uppercase tracking-wider">·</span>
            </div>
          </div>
          </div>
          <!-- collection bar — Reset all / Save / Load / Manage. Hidden in
               fullscreen with the rest of the chrome. controllers.js fills it. -->
          <div id="mt-bar" class="fs-hide my-6 flex flex-wrap items-center justify-between gap-3 border-t border-slate-200 pt-4 dark:border-slate-700"></div>
          <!-- name of the currently loaded collection (controllers.js fills it).
               Stays visible in fullscreen as a top-center title. -->
          <div id="mt-loaded-name" class="mb-4 hidden text-center text-xl font-bold tracking-tight text-slate-700 dark:text-slate-200"></div>
          <!-- the running list (each row built by controllers.js renderMultiTimers) -->
          <div id="mt-list" class="space-y-2"></div>
        </section>
      </div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
