<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- brushed-metal rim: light upper-left to dark lower-right -->
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eceff1"/>
      <stop offset="0.45" stop-color="#b0bec5"/>
      <stop offset="0.75" stop-color="#78909c"/>
      <stop offset="1" stop-color="#455a64"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd8dc"/>
      <stop offset="1" stop-color="#607d8b"/>
    </linearGradient>
    <!-- white dial with a soft inset shading -->
    <radialGradient id="face" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.75" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#dbe2e7"/>
    </radialGradient>
  </defs>

  <!-- crown / stopwatch button at the top -->
  <rect x="56" y="2" width="16" height="16" rx="4" fill="url(#crown)" stroke="#455a64" stroke-width="1"/>

  <!-- metal case -->
  <circle cx="64" cy="71" r="55" fill="url(#rim)"/>
  <circle cx="64" cy="71" r="55" fill="none" stroke="#37474f" stroke-width="1.5" opacity="0.35"/>
  <!-- inner bezel + dial -->
  <circle cx="64" cy="71" r="47" fill="#cfd8dc"/>
  <circle cx="64" cy="71" r="44" fill="url(#face)"/>

  <!-- hour ticks -->
  <g stroke="#546e7a" stroke-width="2.5" stroke-linecap="round">
    <line x1="64" y1="29" x2="64" y2="35"/>
    <line x1="87.5" y1="31.3" x2="84.9" y2="36.5"/>
    <line x1="104.7" y1="48.5" x2="99.5" y2="51.1"/>
    <line x1="107" y1="71" x2="101" y2="71"/>
    <line x1="104.7" y1="93.5" x2="99.5" y2="90.9"/>
    <line x1="87.5" y1="110.7" x2="84.9" y2="105.5"/>
    <line x1="64" y1="113" x2="64" y2="107"/>
    <line x1="40.5" y1="110.7" x2="43.1" y2="105.5"/>
    <line x1="23.3" y1="93.5" x2="28.5" y2="90.9"/>
    <line x1="21" y1="71" x2="27" y2="71"/>
    <line x1="23.3" y1="48.5" x2="28.5" y2="51.1"/>
    <line x1="40.5" y1="31.3" x2="43.1" y2="36.5"/>
  </g>
  <!-- cardinal ticks, heavier -->
  <g stroke="#37474f" stroke-width="3.5" stroke-linecap="round">
    <line x1="64" y1="28" x2="64" y2="36"/>
    <line x1="108" y1="71" x2="100" y2="71"/>
    <line x1="64" y1="114" x2="64" y2="106"/>
    <line x1="20" y1="71" x2="28" y2="71"/>
  </g>

  <!-- hands, posed at 10:10 with a red sweep second -->
  <g stroke-linecap="round">
    <line x1="64" y1="71" x2="42.7" y2="56.1" stroke="#263238" stroke-width="5"/>
    <line x1="64" y1="71" x2="96.9" y2="52" stroke="#263238" stroke-width="3.5"/>
    <line x1="64" y1="71" x2="27.6" y2="92" stroke="#e53935" stroke-width="2"/>
  </g>
  <circle cx="64" cy="71" r="4.5" fill="#263238"/>
  <circle cx="64" cy="71" r="2" fill="#e53935"/>
</svg>
