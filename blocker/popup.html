<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible w-72 bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div class="p-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img src="icons/icon32.png" alt="" class="h-5 w-5 shrink-0 self-center" />
          <h1 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">Blocker</h1>
        </div>
        <div class="flex items-center gap-0.5">
          <button
            id="settings"
            type="button"
            data-i18n-attr="title:settings,aria-label:settings"
            class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:text-slate-500 dark:text-slate-400 dark:hover:text-slate-200"
            title="Settings"
            aria-label="Settings"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
          <button
            id="theme-toggle"
            type="button"
            data-i18n-attr="title:themeToggle,aria-label:themeToggle"
            class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
            title="Toggle dark mode"
            aria-label="Toggle dark mode"
          >
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="my-3 border-t border-slate-200 dark:border-slate-700"></div>

      <!-- tabs -->
      <div role="tablist" class="flex gap-1 rounded-lg bg-slate-200 p-1 dark:bg-slate-800">
        <button id="tab-control" type="button" role="tab" aria-controls="panel-control" aria-selected="true" class="tab-btn is-active" data-tab="control" data-i18n="tabControl">Control</button>
        <button id="tab-allowed" type="button" role="tab" aria-controls="panel-allowed" aria-selected="false" class="tab-btn inline-flex items-center justify-center gap-1.5" data-tab="allowed">
          <span data-i18n="tabAllowed">Allowed</span>
          <span id="allowedCount" class="hidden rounded-full bg-slate-300 px-1.5 py-0.5 text-[10px] font-semibold leading-none text-slate-600 dark:bg-slate-600 dark:text-slate-200">0</span>
        </button>
      </div>

      <!-- Control panel -->
      <div id="panel-control" class="tabpanel" role="tabpanel" aria-labelledby="tab-control" tabindex="0">
        <!-- Session length (hidden while blocking / when locked by an admin) -->
        <label id="durationRow" for="duration" class="mt-4 flex items-center justify-between gap-2 text-xs font-medium text-slate-600 dark:text-slate-300">
          <span data-i18n="sessionLength">Block for</span>
          <select
            id="duration"
            class="rounded-md border border-slate-300 bg-white px-2 py-1 text-sm text-slate-800 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-blue-400 dark:focus:ring-blue-400"
          >
            <option value="0" data-i18n="durationUntilStop">Until I stop</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="45">45 min</option>
            <option value="60">60 min</option>
            <option value="90">90 min</option>
            <option value="120">120 min</option>
          </select>
        </label>

        <button
          id="toggleBlock"
          type="button"
          class="mt-3 flex w-full items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-semibold shadow-sm transition active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:cursor-not-allowed dark:focus:ring-offset-slate-900"
        >
          <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="h-4 w-4" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636A9 9 0 1 1 5.636 18.364 9 9 0 0 1 18.364 5.636ZM5.636 5.636l12.728 12.728" />
          </svg>
          <span id="toggleLabel" data-i18n="startBlocking">Start blocking</span>
        </button>

        <!-- Countdown for a timed session -->
        <p id="countdown" role="status" aria-live="polite" class="mt-2 hidden text-center text-xs font-medium text-slate-500 dark:text-slate-400"></p>

        <div id="thisCard" class="mt-4 rounded-lg border border-slate-200 bg-white p-3 shadow-sm dark:border-slate-700 dark:bg-slate-800">
          <div class="flex items-center gap-2">
            <div id="thisSite" class="min-w-0 flex-1 truncate text-sm font-medium text-slate-900 dark:text-slate-100">—</div>
            <button
              id="allowThis"
              type="button"
              title="Allow this site"
              aria-label="Allow this site"
              class="flex shrink-0 items-center justify-center rounded-md border border-blue-200 bg-blue-50 p-1.5 text-blue-700 transition hover:bg-blue-100 focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:cursor-not-allowed disabled:opacity-50 dark:border-blue-900 dark:bg-blue-950 dark:text-blue-300 dark:hover:bg-blue-900"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
            </button>
          </div>
        </div>

        <p id="status" role="status" aria-live="polite" class="mt-2 text-center text-xs text-slate-500 empty:hidden dark:text-slate-400"></p>
      </div>

      <!-- Allowed panel -->
      <div id="panel-allowed" class="tabpanel hidden" role="tabpanel" aria-labelledby="tab-allowed" tabindex="0">
        <form id="addForm" class="mt-4 flex gap-2">
          <input
            id="addInput"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            data-i18n-attr="placeholder:addPlaceholder"
            placeholder="example.com"
            class="min-w-0 flex-1 rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-blue-400 dark:focus:ring-blue-400"
          />
          <button
            id="addBtn"
            type="submit"
            data-i18n="add"
            class="shrink-0 rounded-md bg-blue-600 px-3 py-1.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50"
          >
            Add
          </button>
        </form>

        <div class="mt-3 flex items-center justify-between">
          <span data-i18n="allowedSites" class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Allowed sites</span>
          <button id="clearAll" type="button" data-i18n="clearAll" class="text-[11px] font-medium text-red-600 hover:underline disabled:cursor-not-allowed disabled:opacity-40 dark:text-red-400">Clear all</button>
        </div>

        <p id="empty" data-i18n="emptyAllowed" class="mt-2 text-center text-xs text-slate-400 dark:text-slate-500">No sites allowed yet.</p>
        <div id="list" class="mt-2 space-y-1.5"></div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
