<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="titleOptions">Picker — Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible flex min-h-screen flex-col bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div class="mx-auto w-full max-w-xl flex-1 p-6">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img src="icons/icon32.png" alt="" class="h-5 w-5 shrink-0 self-center" />
          <h1 data-i18n="h1Options" class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">Picker — Settings</h1>
        </div>
        <button
          id="theme-toggle"
          type="button"
          data-i18n-attr="title:themeToggle,aria-label:themeToggle"
          class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>

      <!-- HEX letter case -->
      <section class="mt-6 rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
        <label for="hexCase" class="block text-sm font-semibold text-slate-700 dark:text-slate-200" data-i18n="optHexCase">HEX letter case</label>
        <p class="mt-0.5 text-xs text-slate-500 dark:text-slate-400" data-i18n="optHexCaseHint">How HEX values are shown and copied.</p>
        <select
          id="hexCase"
          class="mt-3 w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm text-slate-800 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500
                 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100 dark:focus:border-blue-400 dark:focus:ring-blue-400"
        >
          <option value="upper" data-i18n="optHexUpper">Uppercase — #1E88E5</option>
          <option value="lower" data-i18n="optHexLower">Lowercase — #1e88e5</option>
        </select>
      </section>

      <!-- Value formats -->
      <section class="mt-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
        <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-200" data-i18n="optFormats">Value formats</h2>
        <p class="mt-0.5 text-xs text-slate-500 dark:text-slate-400" data-i18n="optFormatsHint">Which formats appear in the popup.</p>
        <div id="formatList" class="mt-3 grid grid-cols-2 gap-x-4 gap-y-2 sm:grid-cols-3"></div>
      </section>

      <!-- Copy on pick -->
      <section class="mt-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
        <label for="copyOnPick" class="block text-sm font-semibold text-slate-700 dark:text-slate-200" data-i18n="optCopyOnPick">Copy on pick</label>
        <p class="mt-0.5 text-xs text-slate-500 dark:text-slate-400" data-i18n="optCopyOnPickHint">Automatically copy this format to the clipboard right after you pick a color.</p>
        <select
          id="copyOnPick"
          class="mt-3 w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm text-slate-800 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500
                 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100 dark:focus:border-blue-400 dark:focus:ring-blue-400"
        ></select>
      </section>

      <!-- Recent colors -->
      <section class="mt-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
        <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-200" data-i18n="optRecent">Recent colors</h2>
        <p id="recentHint" class="mt-0.5 text-xs text-slate-500 dark:text-slate-400"></p>
        <div id="recentList" class="mt-3 flex flex-wrap gap-2"></div>
        <button
          id="clearRecent"
          type="button"
          class="mt-3 inline-flex items-center gap-1.5 rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 shadow-sm transition hover:border-red-400 hover:bg-red-50 hover:text-red-600 focus:outline-none focus:ring-2 focus:ring-red-300
                 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:border-red-500 dark:hover:bg-red-950 dark:hover:text-red-300"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.35 9m-4.78 0L9.26 9M9.97 4.5h4.06M19.5 5.25l-.84 12.6a2.25 2.25 0 01-2.24 2.1H7.58a2.25 2.25 0 01-2.24-2.1L4.5 5.25M3.75 5.25h16.5" />
          </svg>
          <span data-i18n="optClearRecent">Clear recent colors</span>
        </button>
      </section>

      <!-- Tailwind palette -->
      <section class="mt-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
        <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-200" data-i18n="optTwPalette">Tailwind palette</h2>
        <p class="mt-0.5 text-xs text-slate-500 dark:text-slate-400" data-i18n="optTwPaletteHint">The “nearest Tailwind” match uses the palette bundled at build time.</p>
        <p id="twInfo" class="mt-2 font-mono text-sm text-slate-700 dark:text-slate-200"></p>
      </section>
    </div>

    <footer class="sticky bottom-0 z-10 border-t border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
      <div class="mx-auto flex w-full max-w-xl items-center justify-between px-6 py-3">
        <span id="status" class="text-xs font-medium text-blue-600 dark:text-blue-400" role="status" aria-live="polite"></span>
        <button id="winClose" type="button"
          class="inline-flex items-center gap-1.5 rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-3.5 w-3.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
          <span data-i18n="close">Close</span>
        </button>
      </div>
    </footer>
    <script type="module" src="options.js"></script>
  </body>
</html>
