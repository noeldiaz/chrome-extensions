<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="invisible w-80 bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div class="p-4">
      <!-- header -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img src="icons/icon32.png" alt="" class="h-5 w-5 shrink-0 self-center" />
          <h1 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">Picker</h1>
        </div>
        <div class="flex items-center gap-1">
          <button
            id="settings"
            type="button"
            data-i18n-attr="title:settings,aria-label:settings"
            class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
            title="Settings"
            aria-label="Settings"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
          <button
            id="theme-toggle"
            type="button"
            data-i18n-attr="title:themeToggle,aria-label:themeToggle"
            class="rounded p-1 text-slate-500 transition hover:text-slate-700 focus:outline-none dark:text-slate-400 dark:hover:text-slate-200"
            title="Toggle dark mode"
            aria-label="Toggle dark mode"
          >
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden h-5 w-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="my-3 border-t border-slate-200 dark:border-slate-700"></div>

      <!-- top row: pick (square, icon only) + swatch + favourite — always visible -->
      <div class="flex items-stretch gap-2">
        <button
          id="pick"
          type="button"
          data-i18n-attr="title:pickColor,aria-label:pickColor"
          class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-blue-600 text-white shadow-sm transition hover:bg-blue-700 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-blue-400 disabled:cursor-not-allowed disabled:opacity-50"
          title="Pick a colour"
          aria-label="Pick a colour"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="h-6 w-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 6l3 3m-9.5 9.5L3 21l2.5-5.5L15.5 5.5a2.12 2.12 0 113 3L8.5 18.5z" />
          </svg>
        </button>
        <button
          id="swatch"
          type="button"
          class="flex h-12 flex-1 items-center justify-center rounded-xl border border-slate-200 bg-white font-mono text-sm font-semibold text-slate-400 shadow-inner transition hover:brightness-95 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:border-slate-700 dark:bg-slate-800"
          data-i18n-attr="title:copySwatch,aria-label:swatchAria"
          title="Copy HEX"
          aria-label="Picked colour"
        ></button>
        <button
          id="fav"
          type="button"
          data-i18n-attr="title:favSave,aria-label:favSave"
          class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-400 transition hover:text-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-500"
          title="Save to favourites"
          aria-label="Save to favourites"
        >
          <svg id="fav-ico" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-5 w-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.5l2.3 4.67 5.15.75-3.73 3.63.88 5.13-4.6-2.42-4.6 2.42.88-5.13L4.07 8.92l5.15-.75 2.26-4.67z" />
          </svg>
        </button>
      </div>

      <p id="noEd" class="mt-2 hidden text-xs text-amber-600 dark:text-amber-400" data-i18n="noEyedropper">
        This browser has no screen eyedropper — use the colour box below instead.
      </p>

      <!-- tabs -->
      <div role="tablist" class="mt-3 flex gap-1 rounded-lg bg-slate-200 p-1 dark:bg-slate-800">
        <button id="tab-color" type="button" role="tab" class="tab-btn is-active" data-tab="color" data-i18n="tabColor">Color</button>
        <button id="tab-page" type="button" role="tab" class="tab-btn" data-tab="page" data-i18n="tabPage">Page</button>
        <button id="tab-tools" type="button" role="tab" class="tab-btn" data-tab="tools" data-i18n="tabTools">Tools</button>
      </div>

      <!-- COLOR tab: formats, shades, favourites, recent -->
      <div id="panel-color" class="tabpanel mt-3" role="tabpanel">
        <details id="formats" class="disclosure mt-0" open>
          <summary>
            <span data-i18n="formatsTitle">Favorite Formats</span>
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
          </summary>
          <div id="values" class="mt-1 flex flex-wrap gap-1.5"></div>
        </details>

        <details id="otherFormats" class="disclosure">
          <summary>
            <span data-i18n="otherFormatsTitle">Other Formats</span>
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
          </summary>
          <div id="otherValues" class="mt-1 flex flex-wrap gap-1.5"></div>
        </details>

        <details id="shades" class="disclosure" open>
          <summary>
            <span data-i18n="shades">Shades</span>
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
          </summary>
          <div id="ramp" class="mt-1 flex gap-1"></div>
        </details>

        <!-- favourites -->
        <details id="favWrap" class="disclosure hidden" open>
          <summary>
            <span data-i18n="favorites">Favourites</span>
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
          </summary>
          <div class="mt-1">
            <div class="mb-1 flex justify-end gap-1">
              <button id="favExport" type="button" data-i18n-attr="title:favExport,aria-label:favExport" class="rounded p-1 text-slate-400 transition hover:text-slate-700 focus:outline-none dark:text-slate-500 dark:hover:text-slate-200" title="Export favourites" aria-label="Export favourites">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
              </button>
              <button id="favImport" type="button" data-i18n-attr="title:favImport,aria-label:favImport" class="rounded p-1 text-slate-400 transition hover:text-slate-700 focus:outline-none dark:text-slate-500 dark:hover:text-slate-200" title="Import favourites" aria-label="Import favourites">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M7.5 7.5L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
              </button>
            </div>
            <div id="favList" class="space-y-1"></div>
            <input id="favFile" type="file" accept="application/json,.json" class="hidden" />
          </div>
        </details>

        <!-- recent picks -->
        <div id="recentWrap" class="mt-3 hidden">
          <div class="flex items-center justify-between">
            <span class="cap mb-0" data-i18n="recent">Recent</span>
            <button
              id="clearRecent"
              type="button"
              data-i18n-attr="title:recentClear,aria-label:recentClear"
              class="rounded p-1 text-slate-400 transition hover:text-red-500 focus:outline-none dark:text-slate-500"
              title="Clear recent colours"
              aria-label="Clear recent colours"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.35 9m-4.78 0L9.26 9M9.97 4.5h4.06M19.5 5.25l-.84 12.6a2.25 2.25 0 01-2.24 2.1H7.58a2.25 2.25 0 01-2.24-2.1L4.5 5.25M3.75 5.25h16.5" />
              </svg>
            </button>
          </div>
          <div id="recent" class="mt-1 flex flex-wrap gap-1.5"></div>
        </div>
      </div>

      <!-- PAGE tab: colours extracted from the current tab -->
      <div id="panel-page" class="tabpanel mt-3 hidden" role="tabpanel">
        <button
          id="scanPage"
          type="button"
          class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:border-blue-400 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 dark:hover:border-blue-500 dark:hover:bg-blue-950"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>
          <span data-i18n="scanPage">Scan this page</span>
        </button>
        <p id="pageMsg" class="mt-3 hidden text-center text-xs text-slate-400 dark:text-slate-500"></p>
        <div id="pageColors" class="mt-3 grid grid-cols-6 gap-1.5"></div>
      </div>

      <!-- TOOLS tab: contrast checker + manual colour -->
      <div id="panel-tools" class="tabpanel mt-3 hidden" role="tabpanel">
        <details id="contrast" class="disclosure mt-0" open>
          <summary>
            <span data-i18n="contrast">Contrast</span>
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
          </summary>
          <div class="mt-1">
            <div class="flex items-center gap-2">
              <span class="cap mb-0" data-i18n="contrastAgainst">Against</span>
              <input id="cbg" type="color" value="#ffffff" class="h-7 w-12 cursor-pointer rounded border border-slate-300 bg-white p-0.5 dark:border-slate-600 dark:bg-slate-800" />
              <button id="cbgPick" type="button" data-i18n-attr="title:pickColor,aria-label:pickColor" class="rounded p-1 text-slate-400 transition hover:text-slate-700 focus:outline-none dark:text-slate-500 dark:hover:text-slate-200" title="Pick a colour" aria-label="Pick a colour">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="h-4 w-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15 6l3 3m-9.5 9.5L3 21l2.5-5.5L15.5 5.5a2.12 2.12 0 113 3L8.5 18.5z" /></svg>
              </button>
              <span id="cratio" class="ml-auto font-mono text-sm font-semibold tabular-nums"></span>
            </div>
            <div id="cpreview" class="mt-2 flex items-center justify-center gap-3 rounded-lg border border-slate-200 py-2 text-sm font-semibold dark:border-slate-700">
              <span>Aa</span><span class="text-lg">Aa</span>
            </div>
            <div id="cbadges" class="mt-2 grid grid-cols-4 gap-1 text-center text-[10px] font-semibold"></div>
          </div>
        </details>

        <div class="mt-4 flex items-center gap-3">
          <label class="cap mb-0 w-20 shrink-0 leading-tight" for="native" data-i18n="orChoose">or choose a colour</label>
          <input
            id="native"
            type="color"
            value="#1e88e5"
            class="h-9 flex-1 cursor-pointer rounded-md border border-slate-300 bg-white p-0.5 dark:border-slate-600 dark:bg-slate-800"
          />
        </div>
      </div>

      <p id="status" class="mt-3 hidden text-center text-xs font-medium text-blue-600 dark:text-blue-400" role="status" aria-live="polite"></p>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
