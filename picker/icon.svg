<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bulb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#546e7a"/>
      <stop offset="1" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="collar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eceff1"/>
      <stop offset="0.5" stop-color="#cfd8dc"/>
      <stop offset="1" stop-color="#90a4ae"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#eceff1"/>
      <stop offset="1" stop-color="#cfd8dc"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#42a5f5"/>
      <stop offset="1" stop-color="#1565c0"/>
    </linearGradient>
    <clipPath id="tubeClip">
      <path d="M54 47 Q54 44 57 44 L71 44 Q74 44 74 47 L74 100 L64 122 L54 100 Z"/>
    </clipPath>
  </defs>

  <!-- rainbow colour-wheel ring, fills the corners the diagonal dropper leaves empty -->
  <g>
    <path d="M64.00 4.00 A60 60 0 0 1 94.00 12.04 L83.50 30.23 A39 39 0 0 0 64.00 25.00 Z" fill="#ee5f2f"/>
